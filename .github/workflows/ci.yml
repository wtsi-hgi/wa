name: CI

on:
    pull_request:
        branches:
            - develop

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: false

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: frontend/pnpm-lock.yaml

            - name: Install frontend dependencies
              working-directory: frontend
              run: pnpm install --frozen-lockfile

            - name: Run lint
              run: make lint

    test:
        name: Test
        runs-on: ubuntu-latest
        timeout-minutes: 40
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: false

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: frontend/pnpm-lock.yaml

            - name: Install frontend dependencies
              working-directory: frontend
              run: pnpm install --frozen-lockfile

            - name: Install Playwright browsers
              working-directory: frontend
              run: pnpm exec playwright install --with-deps chromium

            - name: Run tests
              run: make test
